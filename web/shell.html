<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phosphoric — ORIC-1/Atmos emulator (WebAssembly)</title>
<style>
  :root { color-scheme: dark; --bg:#0a0a0e; --panel:#15151f; --line:#2a2a40;
          --ink:#e2e2ea; --dim:#8a8a99; --accent:#7aa2ff; --hot:#ffb454; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 50% -10%, #16162a 0%, var(--bg) 60%);
    color: var(--ink); font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    display: flex; min-height: 100vh;
  }
  /* ── left icon rail ─────────────────────────────────────────────── */
  #rail {
    width: 72px; flex: 0 0 72px; background: rgba(18,18,28,.72);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 14px 0; position: sticky; top: 0; height: 100vh;
  }
  .rbtn { width: 48px; height: 48px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink); cursor: pointer; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    transition: background .12s, border-color .12s, transform .05s; }
  .rbtn:hover { border-color: #44446a; background: #1b1b2a; }
  .rbtn:active { transform: scale(.94); }
  .rbtn svg { width: 22px; height: 22px; stroke: currentColor; fill: none;
              stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .rbtn .cap { font-size: 8.5px; letter-spacing: .02em; color: var(--dim); line-height: 1; }
  .rbtn.on { border-color: var(--accent); color: var(--accent); }
  .rbtn.on .cap { color: var(--accent); }
  .rbtn .badge { position: absolute; top: -5px; right: -5px; min-width: 17px; height: 17px;
    padding: 0 4px; border-radius: 9px; background: var(--accent); color: #06060a;
    font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .rbtn[hidden] { display: none; }
  .rspacer { flex: 1; }

  /* ── stage ──────────────────────────────────────────────────────── */
  #stage { flex: 1; display: flex; flex-direction: column; align-items: center;
           gap: 12px; padding: 18px 14px 26px; min-width: 0; }
  h1 { font-size: 14px; font-weight: 600; letter-spacing: .05em; margin: 2px 0 0; color: #c9c9d6; }
  h1 small { color: var(--dim); font-weight: 400; }
  #frame { background: #000; border: 1px solid var(--line); border-radius: 10px;
           padding: 10px; box-shadow: 0 10px 50px rgba(0,0,0,.6); position: relative; }
  canvas { display: block; width: 680px; max-width: 88vw; aspect-ratio: 240/224;
           image-rendering: pixelated; background: #000; border-radius: 5px; }
  /* Fullscreen: blow the canvas up to fill the screen, centered, ratio kept. */
  #frame:fullscreen, #frame:-webkit-full-screen {
    width: 100vw; height: 100vh; max-width: none; padding: 0; margin: 0;
    border: 0; border-radius: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  #frame:fullscreen canvas, #frame:-webkit-full-screen canvas {
    width: auto; height: 100vh; max-width: 100vw; max-height: 100vh; border-radius: 0;
  }
  #drop-veil { position: absolute; inset: 6px; border: 2px dashed var(--accent); border-radius: 7px;
    display: none; align-items: center; justify-content: center;
    background: rgba(10,10,18,.8); color: var(--accent); font-size: 14px; z-index: 9; }
  body.dragging #drop-veil { display: flex; }
  #status { font-size: 12px; color: var(--dim); min-height: 1.2em; text-align: center; }

  /* ── ORIC virtual keyboard — OVERLAY over the screen, toggleable ─── */
  #kbd {
    position: absolute; left: 10px; right: 10px; bottom: 10px; z-index: 8;
    background: linear-gradient(180deg, rgba(26,26,42,.50), rgba(12,12,22,.46));
    backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
    border: 1px solid rgba(120,130,180,.22); border-radius: 12px;
    padding: 9px; display: flex; flex-direction: column; gap: 5px;
    box-shadow: 0 6px 26px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    transition: opacity .18s, transform .18s;
  }
  #frame.kbd-off #kbd { opacity: 0; transform: translateY(8px); pointer-events: none; }
  #kbd .row { display: flex; gap: 5px; }
  .key { flex: 1 1 0; min-width: 0; height: 40px; border-radius: 7px;
    background: rgba(44,46,68,.62); border: 1px solid rgba(150,160,200,.20);
    color: #eef0f8; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none;
    line-height: 1; box-shadow: inset 0 -2px 0 rgba(0,0,0,.25);
    transition: background .06s, transform .04s; }
  .key .sup { font-size: 9px; color: var(--dim); height: 9px; margin-bottom: 1px; }
  .key.held, .key:active { background: var(--accent); color: #06060a; transform: translateY(1px); }
  .key.held .sup, .key:active .sup { color: #06060a; }
  .key.mod { background: rgba(64,54,40,.6); font-size: 10.5px; letter-spacing: .02em; }
  .key.mod.on { background: var(--hot); color: #06060a; border-color: var(--hot); }
  .key.inert { background: rgba(40,42,68,.18); border-style: dashed; border-color: rgba(150,160,200,.12);
               cursor: default; box-shadow: none; }
  .key.lbl { font-size: 10.5px; }
  .w12{flex-grow:1.2} .w15{flex-grow:1.5} .w18{flex-grow:1.8} .w20{flex-grow:2} .ret{flex-grow:2.2} .space{flex-grow:9}
  @media (max-width:720px){ .key{height:34px;font-size:11px} #rail{width:60px;flex-basis:60px} }
</style>
</head>
<body>
  <nav id="rail">
    <button class="rbtn" id="btn-machine" title="Toggle ORIC-1 / Atmos (cold restart)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="1.5"/><path d="M8 20h8M12 17v3"/></svg>
      <span class="cap">MODEL</span><span class="badge" id="machine-badge">A</span>
    </button>
    <button class="rbtn" id="btn-load" title="Load a .tap or .dsk file">
      <svg viewBox="0 0 24 24"><path d="M3 7.5A1.5 1.5 0 0 1 4.5 6H9l2 2h8.5A1.5 1.5 0 0 1 21 9.5V17a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M12 17v-5m0 0-2.2 2.2M12 12l2.2 2.2"/></svg>
      <span class="cap">LOAD</span>
    </button>
    <button class="rbtn" id="btn-eject" title="Eject media" hidden>
      <svg viewBox="0 0 24 24"><path d="M5 15h14M6 12l6-7 6 7z"/></svg><span class="cap">EJECT</span>
    </button>
    <button class="rbtn" id="btn-reset" title="Reset (cold reboot)">
      <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.6-5.9M20 3.5V8h-4.5"/></svg><span class="cap">RESET</span>
    </button>
    <button class="rbtn on" id="btn-kbd" title="Show / hide the on-screen keyboard">
      <svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="2"/><path d="M6 9.5h.01M9 9.5h.01M12 9.5h.01M15 9.5h.01M18 9.5h.01M6.5 14h11"/></svg>
      <span class="cap">KEYS</span>
    </button>
    <div class="rspacer"></div>
    <button class="rbtn" id="btn-fs" title="Fullscreen">
      <svg viewBox="0 0 24 24"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg>
      <span class="cap">FULL</span>
    </button>
    <input id="file-input" type="file" accept=".tap,.dsk,.TAP,.DSK" hidden>
  </nav>

  <div id="stage">
    <h1>Phosphoric <small>— ORIC-1 / Atmos · WebAssembly</small></h1>
    <div id="frame">
      <canvas id="canvas" tabindex="1" oncontextmenu="event.preventDefault()" width="240" height="224"></canvas>
      <div id="drop-veil">Drop a .tap or .dsk file…</div>
      <div id="kbd" aria-label="ORIC virtual keyboard"></div>
    </div>
    <div id="status">Loading…</div>
  </div>

<script>
//  ── config ───────────────────────────────────────────────────────────────
var ROMS = { atmos: '/roms/basic11b.rom', oric1: '/roms/basic10.rom' };
var rom = sessionStorage.getItem('phos_rom') || 'atmos';
var mediaName = sessionStorage.getItem('phos_media_name') || '';
var mediaKind = sessionStorage.getItem('phos_media_kind') || '';
var args = ['-r', ROMS[rom] || ROMS.atmos];
if (mediaName && mediaKind === 'tap') args.push('-t', '/media/' + mediaName, '-f');
if (mediaName && mediaKind === 'dsk') args.push('--disk-rom', '/roms/microdis.rom', '-d', '/media/' + mediaName);

function idb(cb){ var r=indexedDB.open('phosphoric',1);
  r.onupgradeneeded=function(){r.result.createObjectStore('media');};
  r.onsuccess=function(){cb(r.result);}; r.onerror=function(){cb(null);}; }
function idbPut(k,b,d){ idb(function(db){ if(!db)return d&&d();
  var t=db.transaction('media','readwrite'); t.objectStore('media').put(b,k);
  t.oncomplete=function(){d&&d();}; }); }
function idbGet(k,d){ idb(function(db){ if(!db)return d(null);
  var g=db.transaction('media','readonly').objectStore('media').get(k);
  g.onsuccess=function(){d(g.result||null);}; g.onerror=function(){d(null);}; }); }

var statusEl = document.getElementById('status');
var ready = false;
var Module = {
  arguments: args, canvas: document.getElementById('canvas'),
  print:function(t){console.log(t);}, printErr:function(t){console.warn(t);},
  preRun: [function(){ if(!mediaName) return; addRunDependency('media-file');
    idbGet(mediaName, function(buf){ try{ if(buf){ try{FS.mkdir('/media');}catch(e){}
      FS.writeFile('/media/'+mediaName, new Uint8Array(buf)); } }catch(e){console.warn(e);}
      removeRunDependency('media-file'); }); }],
  onRuntimeInitialized: function(){ ready=true; refreshUI(); }
};

function refreshUI(){
  document.getElementById('machine-badge').textContent = (rom==='oric1')?'1':'A';
  var ej=document.getElementById('btn-eject'); ej.hidden=!mediaName; if(mediaName) ej.title='Eject '+mediaName;
  var label=(rom==='oric1'?'ORIC-1 / BASIC 1.0':'Atmos / BASIC 1.1');
  if(mediaName) label += ' · '+mediaName+' ('+mediaKind+')';
  statusEl.textContent=(ready?'Running — ':'Loading — ')+label;
}
document.getElementById('btn-machine').onclick=function(){ sessionStorage.setItem('phos_rom', rom==='oric1'?'atmos':'oric1'); location.reload(); };
document.getElementById('btn-reset').onclick=function(){ location.reload(); };
document.getElementById('btn-eject').onclick=function(){ sessionStorage.removeItem('phos_media_name'); sessionStorage.removeItem('phos_media_kind'); location.reload(); };
document.getElementById('btn-load').onclick=function(){ document.getElementById('file-input').click(); };
document.getElementById('file-input').onchange=function(e){ if(e.target.files[0]) loadMedia(e.target.files[0]); };
document.getElementById('btn-fs').onclick=function(){ var f=document.getElementById('frame');
  if(!document.fullscreenElement)(f.requestFullscreen||f.webkitRequestFullscreen).call(f); else document.exitFullscreen(); };
// keyboard overlay toggle
var btnKbd=document.getElementById('btn-kbd'), frame=document.getElementById('frame');
btnKbd.onclick=function(){ var off=frame.classList.toggle('kbd-off'); btnKbd.classList.toggle('on', !off); };

function loadMedia(file){
  var low=file.name.toLowerCase(); var kind=low.endsWith('.dsk')?'dsk':(low.endsWith('.tap')?'tap':'');
  if(!kind){ alert('Unsupported file — drop a .tap or .dsk'); return; }
  file.arrayBuffer().then(function(buf){ idbPut(file.name, buf, function(){
    sessionStorage.setItem('phos_media_name', file.name); sessionStorage.setItem('phos_media_kind', kind); location.reload(); }); });
}
var dd=0;
window.addEventListener('dragenter',function(e){e.preventDefault(); if(dd++===0)document.body.classList.add('dragging');});
window.addEventListener('dragover',function(e){e.preventDefault();});
window.addEventListener('dragleave',function(e){e.preventDefault(); if(--dd<=0){dd=0;document.body.classList.remove('dragging');}});
window.addEventListener('drop',function(e){e.preventDefault(); dd=0; document.body.classList.remove('dragging');
  if(e.dataTransfer.files&&e.dataTransfer.files[0]) loadMedia(e.dataTransfer.files[0]);});
window.addEventListener('click',function(){ if(Module.SDL2&&Module.SDL2.audioContext&&Module.SDL2.audioContext.state==='suspended') Module.SDL2.audioContext.resume(); });

//  ── ORIC keyboard — layout & shifted symbols derived from the emulator's
//     keyboard matrix (src/io/keyboard.c char_map): 2→@, 6→^, etc. ──────────
var ESC=27,RET=13,SPC=32,DEL=0x84,UP=0x80,DN=0x81,LF=0x82,RG=0x83;
var LAYOUT = [
  [['ESC',ESC,'lbl w12'],['1',49,'','!'],['2',50,'','@'],['3',51,'','#'],['4',52,'','$'],['5',53,'','%'],['6',54,'','^'],['7',55,'','&'],['8',56,'','*'],['9',57,'','('],['0',48,'',')'],['-',45,'','_'],['=',61,'','+'],['DEL',DEL,'lbl w12']],
  [['CTRL','M_C','mod w15'],['Q',113],['W',119],['E',101],['R',114],['T',116],['Y',121],['U',117],['I',105],['O',111],['P',112],['[',91,'','{'],[']',93,'','}'],['RET',RET,'lbl ret']],
  [['FUNCT','M_F','mod w18'],['A',97],['S',115],['D',100],['F',102],['G',103],['H',104],['J',106],['K',107],['L',108],[';',59,'',':'],["'",39,'','"'],['\\',92,'','|']],
  [['SHIFT','M_S','mod w20'],['Z',122],['X',120],['C',99],['V',118],['B',98],['N',110],['M',109],[',',44,'','<'],['.',46,'','>'],['/',47,'','?'],['SHIFT','M_S','mod w15'],['↑',UP,'lbl']],
  [['SPACE',SPC,'space'],['←',LF,'lbl'],['↓',DN,'lbl'],['→',RG,'lbl']]
];
var mods={c:false,f:false,s:false};
function callKey(code,down){ if(!ready)return;
  try{ Module.ccall('web_key',null,['number','number','number','number','number'],
    [code,mods.c?1:0,mods.f?1:0,mods.s?1:0,down?1:0]); }catch(e){} }
function syncMods(){ document.querySelectorAll('.key.mod').forEach(function(el){ var s=el.dataset.mod; if(s) el.classList.toggle('on',mods[s]); }); }
function clearMods(){ mods.c=mods.f=mods.s=false; syncMods(); }
function buildKbd(){
  var root=document.getElementById('kbd');
  LAYOUT.forEach(function(row){ var rd=document.createElement('div'); rd.className='row';
    row.forEach(function(k){ var label=k[0],code=k[1],cls=k[2]||'',sup=k[3]||'';
      // The ORIC-1 keyboard has no FUNCT key (Atmos-only) — render an inert filler.
      if (code==='M_F' && rom==='oric1') {
        var f=document.createElement('div'); f.className='key inert '+cls.replace('mod',''); f.innerHTML='';
        rd.appendChild(f); return;
      }
      var el=document.createElement('div'); el.className='key '+cls;
      var plain=(cls.indexOf('lbl')<0 && cls.indexOf('mod')<0);
      el.innerHTML=(plain?'<span class="sup">'+sup+'</span>':'')+label;
      if(code==='M_C'||code==='M_F'||code==='M_S'){ var slot=code==='M_C'?'c':(code==='M_F'?'f':'s'); el.dataset.mod=slot;
        el.addEventListener('pointerdown',function(e){e.preventDefault(); mods[slot]=!mods[slot]; syncMods();}); }
      else { var press=function(e){e.preventDefault(); el.classList.add('held'); callKey(code,true);};
        var rel=function(e){ if(e)e.preventDefault(); if(!el.classList.contains('held'))return;
          el.classList.remove('held'); callKey(code,false); if(mods.c||mods.f||mods.s) clearMods(); };
        el.addEventListener('pointerdown',press); el.addEventListener('pointerup',rel);
        el.addEventListener('pointerleave',rel); el.addEventListener('pointercancel',rel); }
      rd.appendChild(el); });
    root.appendChild(rd); });
}
buildKbd(); refreshUI();
</script>
{{{ SCRIPT }}}
</body>
</html>
